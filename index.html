<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liberandos | Listen</title>

  <style>
    :root {
      --bg: #000000;
      --text: #ece8e1;
      --muted: #d7d1c8;
      --soft: #b8afa2;
      --line: rgba(255,255,255,0.16);
      --max: 1040px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Courier New", Courier, monospace;
      background: #000;
      color: var(--text);
      font-size: 1.16rem;
    }

    a { color: inherit; text-decoration: none; }

    .wrap {
      width: min(calc(100% - 32px), var(--max));
      margin: 0 auto;
      padding: 28px 0 100px;
    }

    .hero {
      border: 1px solid rgba(255,255,255,0.08);
      position: relative;
    }

    .hero-inner {
      padding: 40px 170px 14px 34px;
    }

    .eyebrow {
      font-size: 3.3rem;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .sub {
      margin-top: 10px;
      color: var(--muted);
      line-height: 1.8;
      max-width: 720px;
    }

    .hero-art {
      position: absolute;
      top: 28px;
      right: 34px;
      width: 120px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-top: 18px;
    }

    .card {
      border: 1px solid rgba(255,255,255,0.08);
      padding: 22px;
    }

    .card h2 {
      font-size: 1.12rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--soft);
      margin-bottom: 16px;
    }

    .platform-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 6px 0;
    }

    .icon {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .label {
      font-size: 1.2rem;
      text-transform: uppercase;
      font-weight: 700;
    }

    .meta {
      font-size: 0.95rem;
      color: var(--muted);
    }

    .utility-links {
      margin-top: 18px;
    }

    .utility-links a {
      border: 1px solid rgba(255,255,255,0.12);
      padding: 10px 14px;
      font-size: 0.9rem;
      text-transform: uppercase;
    }

    /* MOBILE */

    @media (max-width: 820px) {

      .grid {
        grid-template-columns: 1fr;
      }

      .hero-inner {
        padding: 32px 18px 22px;
        text-align: center;
      }

      .hero-inner > div {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .eyebrow {
        display: inline-block;
        margin-bottom: 14px;
      }

      .hero-inner::after {
        content: "";
        display: block;
        width: 72px;
        height: 1px;
        background: rgba(255,255,255,0.18);
        margin: 22px auto 0;
      }

      .hero-art {
        position: static;
        width: 120px;
        margin: 20px auto 0;
      }

      .sub {
        max-width: 260px;
        margin: 0 auto;
        line-height: 1.7;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">

    <section class="hero">
      <div class="hero-inner">
        <div>
          <a href="https://liberandos.com" target="_blank" class="eyebrow">Liberandos</a>
          <p class="sub">Future and past transmissions.</p>
        </div>

        <img class="hero-art" src="https://epk.liberandos.com/LiberandosBest.jpg" />
      </div>
    </section>

    <section class="grid">

      <div class="card">
        <h2>Streaming</h2>

        <a class="platform-btn" href="https://open.spotify.com/artist/0HbCzEo3A58n31XLhVZZPT?si=K-qOc92lTsuH3hoCC-e8mw">
          <span class="icon">◯</span>
          <div>
            <div class="label">Spotify</div>
            <div class="meta">Stream on Spotify</div>
          </div>
        </a>

        <a class="platform-btn" href="https://music.apple.com/us/artist/liberandos/1886977897">
          <span class="icon">◯</span>
          <div>
            <div class="label">Apple Music</div>
            <div class="meta">Listen on Apple Music</div>
          </div>
        </a>

      </div>

      <div class="card">
        <h2>Socials</h2>

        <a class="platform-btn" href="https://www.instagram.com/theliberandos/">
          <span class="icon">◯</span>
          <div>
            <div class="label">Instagram</div>
            <div class="meta">Follow the project</div>
          </div>
        </a>

        <a class="platform-btn" href="https://www.youtube.com/@Liberandos">
          <span class="icon">◯</span>
          <div>
            <div class="label">YouTube</div>
            <div class="meta">Videos and transmissions</div>
          </div>
        </a>

        <div class="utility-links">
          <a href="https://liberandos.com">Go To Main Site</a>
        </div>

      </div>

    </section>

  </main>
</body>
</html>
